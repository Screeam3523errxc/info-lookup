<!DOCTYPE html>
<html>

<head>

<title>Login Admin</title>

<style>
.titulo{
    color:#00ff88;
    text-shadow:
        0 0 5px #00ff88,
        0 0 10px #00ff88,
        0 0 20px #00ff88;
    font-size:28px;
}

body{
    background:#0f172a;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    background:#1e293b;
    padding:30px;
    border-radius:15px;
    width:300px;
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px;
    border-radius:8px;
    border:none;
}

button{
    background:#22c55e;
    color:white;
    border:none;
    padding:10px 25px;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    opacity:0.8;
}

</style>

</head>


<body>

<div class="card">

<h1 class="titulo">⚡ Panel de Administración ⚡</h1>
<h2>🔐 Login</h2>
<form method="POST">

<input
type="text"
name="usuario"
placeholder="Usuario">

<br>

<input
type="password"
name="password"
placeholder="Contraseña">

<br><br>


<p>
{{ captcha }}
</p>

<input
type="number"
name="captcha"
placeholder="Respuesta del captcha"
required>

<button>
Entrar
</button>

</form>

</div>

</body>

</html>
